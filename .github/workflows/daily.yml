name: daily-training

on:
  schedule:
    # GitHub 크론은 정시를 보장하지 않고 특히 정각(0분)은 혼잡해 몇 시간 밀릴 수 있음.
    # → 새벽에 미리 생성 + 아침에 재시도 (같은 날 중복 실행은 generate.py가 알아서 건너뜀)
    - cron: "37 20 * * *"   # UTC 20:37 = KST 05:37 (본 실행)
    - cron: "37 22 * * *"   # UTC 22:37 = KST 07:37 (앞 실행이 밀렸을 때 재시도)
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's content (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate.py

      - name: Build Word file
        run: python scripts/build_docx.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "daily: $(TZ=Asia/Seoul date +%F)" || echo "no changes"
          git push
