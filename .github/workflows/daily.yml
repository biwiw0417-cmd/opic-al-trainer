name: daily-training

on:
  schedule:
    # UTC 22:00 = 한국시간(KST) 아침 07:00
    # 시간을 바꾸려면 아래 cron을 수정하세요. 예) KST 06:00 → "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's content (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate.py

      - name: Build Word file
        run: python scripts/build_docx.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "daily: $(TZ=Asia/Seoul date +%F)" || echo "no changes"
          git push
